<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARVIX PRO | 120FPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid #222; border-radius: 45px; }
        video { border-radius: 25px; border: 1px solid #333; width: 100%; background: #000; margin-top: 15px; }
        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(90deg, #38bdf8, #818cf8, #38bdf8); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body class="p-6">
    <div class="glass p-8 w-full max-w-sm text-center shadow-2xl">
        <h1 class="text-5xl font-black shimmer mb-2 tracking-tighter">ARVIX</h1>
        <p class="text-gray-600 text-[9px] tracking-[0.4em] mb-8 uppercase font-bold">INSTANT STREAM PRO</p>

        <!-- واجهة الرفع -->
        <div id="ui-upload">
            <input type="file" id="vidFile" class="hidden" accept="video/*">
            <div onclick="document.getElementById('vidFile').click()" class="border-2 border-dashed border-sky-900/30 p-12 rounded-[35px] mb-8 bg-sky-500/5 cursor-pointer active:scale-95 transition-all">
                <span class="text-5xl block mb-4">🚀</span>
                <p class="text-sky-400 font-bold text-xs uppercase">اختر الفيديو للمعالجة</p>
            </div>
            <button onclick="startProProcess()" class="w-full bg-sky-600 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">بدء المعالجة ⚡</button>
        </div>

        <!-- واجهة الانتظار -->
        <div id="ui-loading" class="hidden py-10">
            <div class="w-12 h-12 border-4 border-sky-900 border-t-sky-500 rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-sky-500 font-bold italic animate-pulse">جاري المعالجة السحابية...</p>
        </div>

        <!-- واجهة النتيجة (نفس اللي بالصورة) -->
        <div id="ui-result" class="hidden">
            <h2 class="text-xl font-black text-green-500 mb-2">✨ اكتملت المعالجة! ✨</h2>
            
            <video id="player" controls playsinline></video>
            
            <p class="text-gray-500 text-[10px] mt-4 mb-6">يمكنك مشاهدة النتيجة الآن مباشرة</p>
            
            <a id="dlLink" href="#" download class="block w-full bg-white text-black py-5 rounded-2xl font-black text-lg shadow-2xl text-center mb-4 transition-transform active:scale-95">
                تنزيل للمستودع 📥
            </a>
            
            <button onclick="location.reload()" class="text-gray-700 text-[10px] font-bold uppercase tracking-widest">فيديو آخر</button>
        </div>
    </div>

    <script>
        async function startProProcess() {
            const file = document.getElementById('vidFile').files[0];
            if (!file) return alert("اختر فيديو!");

            document.getElementById('ui-upload').classList.add('hidden');
            document.getElementById('ui-loading').classList.remove('hidden');

            const formData = new FormData();
            formData.append('video', file);

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.downloadUrl) {
                    const player = document.getElementById('player');
                    player.src = data.downloadUrl;
                    
                    document.getElementById('dlLink').href = data.downloadUrl;
                    
                    document.getElementById('ui-loading').classList.add('hidden');
                    document.getElementById('ui-result').classList.remove('hidden');
                }
            } catch (e) {
                alert("حدث خطأ، حاول مرة أخرى.");
                location.reload();
            }
        }
    </script>
</body>
</html>
