<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARVIX PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid #222; border-radius: 45px; position: relative; overflow: hidden; }
        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(90deg, #0ea5e9, #2563eb, #0ea5e9); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes shimmer { to { background-position: 200% center; } }
        .progress-container { width: 100%; height: 6px; background: #111; border-radius: 10px; margin-top: 20px; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #0ea5e9; transition: width 0.3s; }
    </style>
</head>
<body class="p-6">

    <div class="glass p-10 w-full max-w-sm text-center shadow-2xl">
        <h1 class="text-6xl font-black shimmer mb-2">ARVIX</h1>
        <p class="text-gray-700 text-[9px] tracking-[0.5em] mb-10 uppercase font-bold italic">Fast Server Engine</p>

        <!-- واجهة البداية -->
        <div id="ui-upload">
            <input type="file" id="vidFile" class="hidden" accept="video/*">
            <div onclick="document.getElementById('vidFile').click()" class="border-2 border-dashed border-sky-900/30 p-12 rounded-[35px] mb-8 bg-sky-500/5 cursor-pointer active:scale-95 transition-all">
                <span class="text-5xl block mb-4">⚡</span>
                <p class="text-sky-400 font-bold text-xs uppercase tracking-widest">اختر الفيديو</p>
            </div>
            <button onclick="processAndAutoDownload()" id="startBtn" class="w-full bg-sky-600 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">بدء المعالجة 🚀</button>
        </div>

        <!-- واجهة المعالجة والتحميل الموحد -->
        <div id="ui-processing" class="hidden py-10">
            <div id="loader" class="w-14 h-14 border-4 border-sky-900 border-t-sky-500 rounded-full animate-spin mx-auto mb-8"></div>
            <h2 id="statusTitle" class="text-xl font-black text-sky-400 italic mb-2 tracking-widest">PROCESSING</h2>
            <p id="statusDesc" class="text-gray-600 text-[10px] font-bold uppercase tracking-widest">تطبيق الكود البرقي للسيرفر...</p>
            
            <!-- شريط تقدم موحد -->
            <div class="progress-container" id="pContainer">
                <div class="progress-bar" id="pBar"></div>
            </div>
        </div>

        <!-- واجهة الحفظ النهائي -->
        <div id="ui-success" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="text-6xl mb-6">✅</div>
            <h2 class="text-2xl font-black text-white mb-2 tracking-tight">جاهز للحفظ!</h2>
            <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-widest leading-relaxed px-4">تمت المعالجة بنجاح. اضغط الزر أدناه لحفظ الفيديو في الاستوديو.</p>
            
            <button id="finalSaveBtn" class="w-full bg-white text-black py-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition-all mb-6">حفظ في الاستوديو 📥</button>
            
            <button onclick="location.reload()" class="text-sky-900 text-[9px] font-bold uppercase tracking-widest border-b border-sky-900 pb-1">معالجة فيديو جديد</button>
        </div>
    </div>

    <script>
        async function processAndAutoDownload() {
            const file = document.getElementById('vidFile').files[0];
            if (!file) return alert("اختر فيديو أولاً!");

            document.getElementById('ui-upload').classList.add('hidden');
            document.getElementById('ui-processing').classList.remove('hidden');

            const formData = new FormData();
            formData.append('video', file);

            try {
                // 1. إرسال الفيديو للمعالجة
                const response = await fetch('/process', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.downloadUrl) {
                    // 2. تحديث الواجهة لبدء "الجلب النهائي" للمقطع
                    document.getElementById('statusTitle').innerText = "FINALIZING";
                    document.getElementById('statusDesc').innerText = "جاري تجهيز المقطع لجهازك...";
                    document.getElementById('pContainer').style.display = 'block';
                    
                    // 3. تحميل المقطع في ذاكرة المتصفح (خلف الكواليس)
                    const videoResponse = await fetch(data.downloadUrl);
                    const blob = await videoResponse.blob();
                    const blobUrl = URL.createObjectURL(blob);

                    // 4. إظهار واجهة الحفظ النهائي
                    document.getElementById('pBar').style.width = '100%';
                    setTimeout(() => {
                        document.getElementById('ui-processing').classList.add('hidden');
                        document.getElementById('ui-success').classList.remove('hidden');
                        
                        document.getElementById('finalSaveBtn').onclick = () => {
                            const a = document.createElement('a');
                            a.href = blobUrl;
                            a.download = "ARVIX_120FPS.mp4";
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                        };
                    }, 500);
                }
            } catch (e) {
                alert("حدث خطأ، حاول مرة أخرى.");
                location.reload();
            }
        }
    </script>
</body>
</html>
