<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARVIX PRO | Long Video Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid #222; border-radius: 45px; }
        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(90deg, #0ea5e9, #2563eb, #0ea5e9); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes shimmer { to { background-position: 200% center; } }
        .loader { width: 50px; height: 50px; border: 4px solid #111; border-top: 4px solid #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <div class="glass p-10 w-full max-w-sm text-center shadow-2xl">
        <h1 class="text-6xl font-black shimmer mb-2 text-sky-500 font-black tracking-tighter">ARVIX</h1>
        <p class="text-gray-700 text-[9px] tracking-[0.5em] mb-10 uppercase font-bold italic">Long Video Cloud Engine</p>

        <!-- واجهة الرفع -->
        <div id="ui-upload">
            <input type="file" id="vidFile" class="hidden" accept="video/*">
            <div onclick="document.getElementById('vidFile').click()" class="border-2 border-dashed border-sky-900/30 p-12 rounded-[35px] mb-8 bg-sky-500/5 cursor-pointer active:scale-95 transition-all">
                <span class="text-5xl block mb-4">☁️</span>
                <p class="text-sky-400 font-bold text-xs uppercase">ارفع فيديو طويل</p>
                <p class="text-gray-600 text-[8px] mt-2 italic font-medium tracking-tight px-4 leading-relaxed">
                    المعالجة تتم على السيرفر، لا تقلق بشأن الذاكرة
                </p>
            </div>
            <button onclick="processLongVideo()" class="w-full bg-sky-600 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">بدء المعالجة ⚡</button>
        </div>

        <!-- واجهة المعالجة (تتحمل الفيديوهات الطويلة) -->
        <div id="ui-loading" class="hidden py-10 text-center">
            <div class="loader mx-auto mb-8"></div>
            <h2 class="text-xl font-black text-sky-400 italic mb-2 tracking-widest uppercase">Processing</h2>
            <p class="text-gray-600 text-[10px] font-bold uppercase tracking-widest">تطبيق الكود البرقي على السيرفر...</p>
            <p class="text-gray-800 text-[8px] mt-4 font-bold italic">لا تغلق الصفحة، السيرفر يعمل الآن</p>
        </div>

        <!-- واجهة التحميل المباشر -->
        <div id="ui-success" class="hidden text-center animate-in fade-in duration-500">
            <div class="text-6xl mb-6">✅</div>
            <h2 class="text-2xl font-black text-white mb-2 tracking-tight">جاهز للتحميل!</h2>
            <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-widest leading-relaxed">اكتملت المعالجة السحابية بنجاح.</p>
            
            <!-- تحميل مباشر بدون استهلاك RAM الجوال -->
            <a id="finalDownloadBtn" href="#" download class="block w-full bg-white text-black py-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition-all mb-6">
                تنزيل المقطع 📥
            </a>
            
            <button onclick="location.reload()" class="text-sky-900 text-[9px] font-bold uppercase tracking-widest border-b border-sky-900 pb-1">معالجة فيديو جديد</button>
        </div>
    </div>

    <script>
        async function processLongVideo() {
            const file = document.getElementById('vidFile').files[0];
            if (!file) return alert("اختر فيديو أولاً!");

            document.getElementById('ui-upload').classList.add('hidden');
            document.getElementById('ui-loading').classList.remove('hidden');

            const formData = new FormData();
            formData.append('video', file);

            try {
                // إرسال الملف للسيرفر
                const response = await fetch('/process', { 
                    method: 'POST', 
                    body: formData 
                });

                const data = await response.json();
                
                if (data.downloadUrl) {
                    // الربط المباشر بملف السيرفر (Direct Linking) لتجنب انهيار الذاكرة
                    const dlBtn = document.getElementById('finalDownloadBtn');
                    dlBtn.href = data.downloadUrl;
                    
                    document.getElementById('ui-loading').classList.add('hidden');
                    document.getElementById('ui-success').classList.remove('hidden');
                } else {
                    throw new Error("خطأ من السيرفر");
                }
            } catch (e) {
                alert("حدث خطأ. قد يكون حجم الفيديو ضخماً جداً أو السيرفر مشغول.");
                location.reload();
            }
        }
    </script>
</body>
</html>
